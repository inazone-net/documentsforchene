    ],
    jp: "苦しみとともにおまえを、赤いほほよ、感ずる心よ」"
  },
  {
    words: [
      ["Horch", "耳を澄ませ", "/hɔʁç/"],
      ["im", "〜の中に", "/ɪm/"],
      ["See,", "湖の", "/zeː/"],
      ["die", "〜が（主格）", "/diː/"],
      ["Wasserfee!", "水の精が！", "/ˈvasɐfeː/"]
    ],
    jp: "耳を澄ませ、湖に水の精が！"
  }
];

const content = document.getElementById('content');
let stanzaEl = null;
let stanzaIndex = 0;

data.forEach(item => {
  if (item.stanza) {
    stanzaIndex++;
    stanzaEl = document.createElement('div');
    stanzaEl.className = 'stanza';
    stanzaEl.style.animationDelay = (stanzaIndex * 0.15) + 's';
    const hdr = document.createElement('div');
    hdr.className = 'stanza-header';
    hdr.innerHTML = `<span class="stanza-num">${item.stanza}</span><div class="stanza-rule"></div>`;
    stanzaEl.appendChild(hdr);
    content.appendChild(stanzaEl);
    return;
  }

  const block = document.createElement('div');
  block.className = 'line-block';
  const lineRow = document.createElement('div');
  lineRow.className = 'line-row';
  const wordRow = document.createElement('div');
  wordRow.className = 'word-row';

  item.words.forEach(([orig, mean, ipa]) => {
    const unit = document.createElement('div');
    unit.className = 'word-unit';
    unit.innerHTML =
      `<span class="w-orig">${orig}</span>` +
      `<span class="w-mean">${mean}</span>` +
      `<span class="w-ipa">${ipa}</span>`;
    wordRow.appendChild(unit);
  });

  const trans = document.createElement('span');
  trans.className = 'trans-text';
  trans.textContent = item.jp;

  lineRow.appendChild(wordRow);
  lineRow.appendChild(trans);
  block.appendChild(lineRow);
  stanzaEl.appendChild(block);
});
</script>
</body>
</html>
