<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freunde, Wasser machet stumm — 対訳資料</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+JP:wght@300;400;500&family=Crimson+Pro:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410;
    --ink-mid: #3d342a;
    --ink-light: #7a6d62;
    --ink-faint: #b8ada4;
    --accent: #8b4a2a;
    --accent-soft: #c4896a;
    --paper: #f5f0e8;
    --paper-warm: #ede6d8;
    --rule: #d4c9bc;
    --blue-gloss: #3a5a7c;
    --blue-muted: #6a8aac;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    padding: 0;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 27px,
        rgba(180,160,140,0.07) 27px,
        rgba(180,160,140,0.07) 28px
      );
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 64px 48px 80px;
  }

  .piece-title {
    font-family: 'EB Garamond', serif;
    font-size: 28px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    padding-bottom: 16px;
    border-bottom: 1.5px solid var(--rule);
    position: relative;
  }
  .piece-title::after {
    content: '';
    display: block;
    width: 36px;
    height: 1px;
    background: var(--accent-soft);
    margin-top: 10px;
  }
  .piece-subtitle {
    font-family: 'Noto Serif JP', serif;
    font-size: 12px;
    font-weight: 300;
    color: var(--ink-light);
    margin-bottom: 32px;
  }

  .stanza {
    margin-bottom: 52px;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.6s ease forwards;
  }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .stanza-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .stanza-num {
    font-family: 'EB Garamond', serif;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .stanza-rule {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--rule), transparent);
  }

  .line-block {
    margin-bottom: 6px;
    padding: 4px 0;
    transition: background 0.2s;
  }
  .line-block:hover {
    background: rgba(139,74,42,0.03);
    border-radius: 4px;
  }

  .line-row {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    width: 100%;
  }

  .word-row {
    display: flex;
    flex-wrap: nowrap;
    gap: 0;
    align-items: flex-start;
    flex: 0 0 auto;
  }

  .word-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 3px;
    min-width: 0;
  }

  .w-orig {
    font-family: 'EB Garamond', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.3;
    white-space: nowrap;
  }

  .w-mean {
    font-family: 'Noto Serif JP', serif;
    font-size: 10.5px;
    font-weight: 300;
    color: var(--blue-gloss);
    margin-top: 2px;
    white-space: nowrap;
    line-height: 1.3;
  }

  .w-ipa {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 11px;
    font-weight: 300;
    color: var(--ink-faint);
    margin-top: 1px;
    white-space: nowrap;
  }

  .trans-text {
    flex: 1 0 auto;
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    font-weight: 300;
    color: var(--accent-soft);
    white-space: nowrap;
    padding-left: 18px;
    padding-bottom: 3px;
    text-align: right;
  }

  .print-btn {
    display: block;
    margin: 0 auto 28px;
    padding: 6px 20px;
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-light);
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: border-color 0.2s, color 0.2s;
  }
  .print-btn:hover { border-color: var(--accent-soft); color: var(--accent); }

  @media print {
    :root {
      --ink: #000; --ink-mid: #000; --ink-light: #000; --ink-faint: #000;
      --accent: #000; --accent-soft: #000; --rule: #000;
      --blue-gloss: #000; --blue-muted: #000;
    }
    @page { size: A4 portrait; margin: 5mm 13mm 5mm 13mm; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    body { background: white !important; }
    body::before { display: none; }
    .print-btn { display: none; }
    .page { max-width: 100%; padding: 0; }
    .piece-title { font-size: 18px; margin-bottom: 2px; padding-bottom: 1.5mm; }
    .piece-title::after { margin-top: 4px; }
    .piece-subtitle { font-size: 8.5px; margin-bottom: 3mm; }
    .stanza { margin-bottom: 2mm; opacity: 1; transform: none; animation: none; }
    .stanza-header { margin-bottom: 0.8mm; }
    .stanza-num { font-size: 8.5px; }
    .line-block { margin-bottom: 0.4mm; padding: 0; }
    .line-block:hover { background: none; }
    .w-orig { font-size: 14.5px; line-height: 1.2; }
    .w-mean { font-size: 7.5px; margin-top: 1px; line-height: 1.2; }
    .w-ipa  { font-size: 9px; margin-top: 0; }
    .word-unit { padding: 0 2px; }
    .trans-text { font-size: 10.5px; padding-left: 8px; padding-bottom: 0; }
  }

  @media (max-width: 600px) {
    .page { padding: 32px 20px 48px; }
    .piece-title { font-size: 22px; }
    .w-orig { font-size: 17px; }
    .word-unit { padding: 0 5px; }
  }
</style>
</head>
<body>
<div class="page">

  <button class="print-btn" onclick="window.print()">印刷 / A4 で保存</button>

  <div class="piece-title">Freunde, Wasser machet stumm</div>
  <div class="piece-subtitle">ドイツ語飲み歌 · 18〜19世紀</div>

  <main id="content"></main>

</div>

<script>
const data = [
  { stanza: "第一連" },
  {
    words: [
      ["Freunde,", "友よ", "/ˈfʁɔʏndə/"],
      ["Wasser", "水は", "/ˈvasɐ/"],
      ["machet", "させる", "/ˈmaxət/"],
      ["stumm,", "無口に", "/ʃtʊm/"]
    ],
    jp: "友よ、水は人を黙らせる"
  },
  {
    words: [
      ["lernet", "学べ", "/ˈlɛʁnət/"],
      ["dieses", "これを", "/ˈdiːzəs/"],
      ["an", "〜から", "/an/"],
      ["den", "定冠詞（与格複数）", "/dɛn/"],
      ["Fischen,", "魚たちから", "/ˈfɪʃən/"]
    ],
    jp: "これを魚たちから学べ"
  },
  {
    words: [
      ["doch", "しかし", "/dɔx/"],
      ["beim", "〜の席では", "/baɪm/"],
      ["Weine", "ワインの", "/ˈvaɪnə/"],
      ["kehrt", "返る", "/keːɐ̯t/"],
      ["sich's", "それが", "/zɪçs/"],
      ["um", "逆に", "/ʊm/"]
    ],
    jp: "しかしワインの席ではそれが逆となる"
  },
  {
    words: [
      ["dieses", "これを", "/ˈdiːzəs/"],
      ["lernt", "学べ", "/lɛʁnt/"],
      ["an", "〜で", "/an/"],
      ["unsern", "私たちの", "/ˈʊnzɐn/"],
      ["Tischen.", "食卓で", "/ˈtɪʃən/"]
    ],
    jp: "これを私たちの食卓で学べ"
  },
  { stanza: "第二連" },
  {
    words: [
      ["Was", "なんと", "/vas/"],
      ["für", "〜な", "/fyːɐ̯/"],
      ["Redner", "雄弁家", "/ˈʁeːdnɐ/"],
      ["sind", "だ", "/zɪnt/"],
      ["wir", "私たちは", "/viːɐ̯/"],
      ["nicht,", "ではないか", "/nɪçt/"]
    ],
    jp: "私たちはなんという雄弁家ではないか"
  },
  {
    words: [
      ["wenn", "〜とき", "/vɛn/"],
      ["der", "〜が（主格）", "/deːɐ̯/"],
      ["Rheinwein", "ラインワインが", "/ˈʁaɪnvaɪn/"],
      ["aus", "〜から", "/aʊs/"],
      ["uns", "私たちを通して", "/ʊns/"],
      ["spricht", "語る", "/ʃpʁɪçt/"]
    ],
    jp: "ラインワインが私たちの口を借りて語るとき"
  },
  {
    words: [
      ["Wir", "私たちは", "/viːɐ̯/"],
      ["ermahnen,", "諭し", "/ɛɐ̯ˈmaːnən/"],
      ["streiten,", "言い争い", "/ˈʃtʁaɪtən/"],
      ["lehren,", "教える", "/ˈleːʁən/"]
    ],
    jp: "私たちは諭し、言い争い、教える"
  },
  {
    words: [
      ["keiner", "誰も〜ない", "/ˈkaɪnɐ/"],
      ["will", "しようとする", "/vɪl/"],
      ["den", "定冠詞（対格男性）", "/dɛn/"],
      ["andern", "他の人の話を", "/ˈandɐn/"],
      ["hören.", "聞く", "/ˈhøːʁən/"]
    ],
    jp: "しかし誰も相手の話を聞こうとしない"
  }
];

const content = document.getElementById('content');
let stanzaEl = null;
let stanzaIndex = 0;

data.forEach(item => {
  if (item.stanza) {
    stanzaIndex++;
    stanzaEl = document.createElement('div');
    stanzaEl.className = 'stanza';
    stanzaEl.style.animationDelay = (stanzaIndex * 0.15) + 's';
    const hdr = document.createElement('div');
    hdr.className = 'stanza-header';
    hdr.innerHTML = `<span class="stanza-num">${item.stanza}</span><div class="stanza-rule"></div>`;
    stanzaEl.appendChild(hdr);
    content.appendChild(stanzaEl);
    return;
  }

  const block = document.createElement('div');
  block.className = 'line-block';
  const lineRow = document.createElement('div');
  lineRow.className = 'line-row';
  const wordRow = document.createElement('div');
  wordRow.className = 'word-row';

  item.words.forEach(([orig, mean, ipa]) => {
    const unit = document.createElement('div');
    unit.className = 'word-unit';
    unit.innerHTML =
      `<span class="w-orig">${orig}</span>` +
      `<span class="w-mean">${mean}</span>` +
      `<span class="w-ipa">${ipa}</span>`;
    wordRow.appendChild(unit);
  });

  const trans = document.createElement('span');
  trans.className = 'trans-text';
  trans.textContent = item.jp;

  lineRow.appendChild(wordRow);
  lineRow.appendChild(trans);
  block.appendChild(lineRow);
  stanzaEl.appendChild(block);
});
</script>
</body>
</html>
