<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドキュメント一覧</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f9f9f9;
      color: #333;
    }
    h1 {
      font-size: 1.4em;
      border-bottom: 2px solid #ccc;
      padding-bottom: 8px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin: 10px 0;
    }
    a {
      text-decoration: none;
      color: #1a6bbf;
      font-size: 1.05em;
    }
    a:hover {
      text-decoration: underline;
    }
    #message {
      color: #888;
      font-size: 0.95em;
    }
  </style>
</head>
<body>
  <h1>ドキュメント一覧</h1>
  <p id="message">読み込み中...</p>
  <ul id="list"></ul>

  <script>
    fetch('https://api.github.com/repos/inazone-net/documentsforchene/contents/')
      .then(res => res.json())
      .then(files => {
        const list = document.getElementById('list');
        const message = document.getElementById('message');
        const htmlFiles = files.filter(f => f.type === 'file' && f.name.endsWith('.html') && f.name !== 'index.html');
        if (htmlFiles.length === 0) {
          message.textContent = 'HTMLファイルが見つかりませんでした。';
          return;
        }
        message.remove();
        htmlFiles.forEach(f => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = f.name;
          a.textContent = f.name;
          li.appendChild(a);
          list.appendChild(li);
        });
      })
      .catch(() => {
        document.getElementById('message').textContent = 'ファイル一覧の取得に失敗しました。';
      });
  </script>
</body>
</html>
